<html lang="en">

      <title>Bhagavad Gita Bot</title>
      <meta name="description" content="Explore Bhagavad Gita shlokas in Telugu with SGS and Sringeri styles, featuring audio recitations and meanings.">
      <meta name="keywords" content="Bhagavad Gita, SGS, Sringeri, Telugu shlokas, audio recitation, spiritual app">

      <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css">
      <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
      <style>
         :root {
         --bg-color: #f0f0f0; --text-color: #2c3e50; --card-bg: #ffffff;
         --card-border: #357EC7; --button-bg: #357EC7; --button-text: #ffffff;
         --button-hover-bg: #1e40af; --header-color: #2c3e50; --subheader-color: #34495e;
         --input-border: #ccc; --modal-bg: #ffffff; --verse-button-bg: #f9f9f9;
         --verse-button-hover-bg: #e0e0e0; --intro-overlay: rgba(0,0,0,0.5);
         --intro-button-bg: #e5e7eb; --intro-button-text: #111827; --intro-tooltip-bg: #ffffff;
         }
         [data-theme="dark"] {
         --bg-color: #1a1a1a; --text-color: #ffffff; --card-bg: #2a2a2a;
         --card-border: #4a90e2; --button-bg: #4a90e2; --button-text: #ffffff;
         --button-hover-bg: #357abd; --header-color: #ffffff; --subheader-color: #cccccc;
         --input-border: #444; --modal-bg: #2a2a2a; --verse-button-bg: #333;
         --verse-button-hover-bg: #444; --intro-overlay: rgba(0,0,0,0.7);
         --intro-button-bg: #444; --intro-button-text: #ffffff; --intro-tooltip-bg: #333;
         }
         *, *::before, *::after { box-sizing: border-box; }
         body { font-family: Outfit, sans-serif; text-align: center; padding: 20px; margin: 0; background-color: var(--bg-color); color: var(--text-color); transition: all 0.3s ease; }
         .page-frame { max-width: 900px; margin: 8px auto; padding: 12px; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
         
         /* TOP BUTTONS FIXED */
         .top-buttons { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 600px; margin: 0 auto; padding: 0 12px; }
         .top-buttons button {
         width: 150px; height: 150px; border-radius: 25%; border: none; background-color: var(--button-bg); color: var(--button-text);
         font-size: 20px; cursor: pointer; transition: all 0.3s ease; background-repeat: no-repeat; background-position: center; background-size: cover;
         }
         .top-buttons button.sgs-button:hover, .top-buttons button.sgs-button:active {
         background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/sankhu.png');
         background-color: white !important; color: transparent !important;
         }
         .top-buttons button.sringeri-button:hover, .top-buttons button.sringeri-button:active,
         .top-buttons button.third-paada-button:hover, .top-buttons button.third-paada-button:active {
         background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/chakra.png');
         background-color: white !important; color: transparent !important;
         }

         /* SHLOKA TEXT FIXED */
         .shloka-text {
         margin-top: 10px; font-size: 1.5em; color: var(--text-color); white-space: pre-wrap; line-height: 1.5;
         min-height: 3em; display: none; justify-content: center; align-items: center; text-align: center;
         font-family: 'Noto Sans Telugu', 'Noto Sans Devanagari', sans-serif;
         }
         .shloka-text.visible, .shloka-text.active { display: block !important; }
         
         /* LANGUAGE GROUP */
         .language-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px auto; padding: 16px 14px; max-width: 600px; width: 100%; background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 14px; }
         .language-group label { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 8px 6px; background: rgba(0,0,0,0.04); border-radius: 10px; font-size: 0.94em; font-weight: 500; }
         
         /* CHAPTER GRID */
         .chapter-btn-grid { display: flex; flex-wrap: wrap; gap: 7px; width: 100%; margin-top: 6px; justify-content: center; }
         .chapter-btn { width: 52px; height: 52px; font-weight: bold; background-color: var(--card-bg); color: var(--text-color); border: 2px solid var(--card-border); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
         .chapter-btn:hover { background-color: var(--button-bg); color: var(--button-text); }
         
         .theme-toggle { position: fixed; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 1001; }
         .theme-toggle button { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-color); }
         #audioPlayer { margin: 10px auto; display: block; width: 100%; max-width: 500px; }
         .textbox-container { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 600px; margin: 12px auto; padding: 12px; border: 2px solid var(--card-border); border-radius: 5px; }
      </style>
   </head>
   <body>
      <div class="theme-toggle">
         <button onclick="setTheme('light')">☀️</button>
         <button onclick="setTheme('dark')">🌙</button>
      </div>
      <div class="page-frame">
         <h1>Srimad Bhagavad Gita</h1>
         <p>Listen, understand and memorize Bhagavad Gita shlokas</p>
         
         <div class="top-buttons">
            <button class="sgs-button" onclick="sendCommand('SGSFirstPaada')">1st Paada<br>Only</button>
            <button class="sringeri-button" onclick="sendCommand('SringeriPaada')">1st or 3rd Paada</button>
            <button class="third-paada-button" onclick="sendCommand('ThirdPaada')">3rd Paada<br>Only</button>
         </div>

         <div class="continuous-play-box" style="margin:25px auto 0;max-width:600px;padding:18px;background:var(--card-bg);border:2px solid var(--card-border);border-radius:12px;">
            <strong>Continuous Random Play</strong><br>
            <input type="radio" name="continuousGap" value="30" id="gap30"> <label for="gap30">30s</label>
            <input type="radio" name="continuousGap" value="45" id="gap45"> <label for="gap45">45s</label>
            <button id="stopContinuousBtn" style="display:none;background:#d32f2f;color:white;padding:5px 15px;border-radius:5px;border:none;margin-left:10px;">Stop</button>
         </div>

         <audio id="audioPlayer" controls></audio>

         <div class="language-group">
            <label><input type="checkbox" id="telugu" checked> తెలుగు</label>
            <label><input type="checkbox" id="devanagari"> देवनागरी</label>
            <label><input type="checkbox" id="english"> English</label>
            <label><input type="checkbox" id="kannada"> ಕನ್ನಡ</label>
            <label><input type="checkbox" id="tamil"> தமிழ்</label>
         </div>

         <div class="textbox-container">
            <div id="sgsText" class="shloka-text">Shloka will appear here (SGS)</div>
            <div id="sringeriText" class="shloka-text visible">Shloka will appear here (Sringeri)</div>
         </div>

         <div class="dropdown-container">
            <label style="display:block; margin:10px 0;">Random Shloka Chapterwise:</label>
            <div class="chapter-btn-grid">
               <script>
                  for(let i=1; i<=18; i++) {
                     document.write(`<button class="chapter-btn" onclick="handleChapterSelect(${i})">${i}</button>`);
                  }
               </script>
            </div>
         </div>
      </div>

      <script>
         // Core Logic Preservation
         function sendCommand(cmd) {
            console.log("Command sent: " + cmd);
            const sgs = document.getElementById('sgsText');
            const sringeri = document.getElementById('sringeriText');
            
            // Logic to fetch and display shloka would go here
            sgs.classList.add('visible');
            sringeri.classList.add('visible');
            
            enableWakeLock();
         }

         function handleChapterSelect(chapter) {
            console.log("Chapter selected: " + chapter);
            sendCommand('Chapter' + chapter);
         }

         function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
         }

         function enableWakeLock() {
            const player = document.getElementById('audioPlayer');
            if (player) player.play().catch(() => {});
         }

         // Load saved theme
         const savedTheme = localStorage.getItem('theme') || 'light';
         setTheme(savedTheme);
      </script>
   </body>
</html>
