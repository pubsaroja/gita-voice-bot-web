<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Bhagavad Gita Bot</title>
      <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css">
      <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
      <style>
         /* THEME & CORE STYLING */
         :root { --bg-color: #f0f0f0; --text-color: #2c3e50; --card-bg: #ffffff; --card-border: #357EC7; --button-bg: #357EC7; --button-text: #ffffff; }
         [data-theme="dark"] { --bg-color: #1a1a1a; --text-color: #ffffff; --card-bg: #2a2a2a; --card-border: #4a90e2; --button-bg: #4a90e2; }
         body { font-family: Outfit, sans-serif; text-align: center; padding: 20px; background-color: var(--bg-color); color: var(--text-color); margin: 0; }
         .page-frame { max-width: 900px; margin: 8px auto; padding: 12px; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }

         /* TOP BUTTONS - SANKHU & CHAKRA */
         .top-buttons { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto; }
         .top-buttons button {
            width: 150px; height: 150px; border-radius: 25%; border: none; background-color: var(--button-bg); color: var(--button-text);
            font-size: 20px; cursor: pointer; transition: all 0.3s ease; background-repeat: no-repeat; background-position: center; background-size: cover;
         }
         .top-buttons button.sgs-button:hover { background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/sankhu.png'); background-color: transparent !important; color: transparent !important; }
         .top-buttons button.sringeri-button:hover, .top-buttons button.third-paada-button:hover { background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/chakra.png'); background-color: transparent !important; color: transparent !important; }

         /* DISPLAY BOXES */
         .language-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px auto; padding: 16px; border: 2px solid var(--card-border); border-radius: 14px; background: var(--card-bg); max-width: 600px; margin-left: auto; margin-right: auto; }
         .shloka-text { font-size: 1.5em; line-height: 1.8; min-height: 3em; display: none; text-align: center; white-space: pre-line; }
         .visible { display: block !important; }
         
         /* CHAPTER GRID */
         .chapter-btn-grid { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 10px; }
         .chapter-btn { width: 52px; height: 52px; font-weight: bold; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); cursor: pointer; }
         .chapter-btn:hover { background-color: var(--button-bg); color: white; }
         
         .theme-toggle { position: fixed; top: 10px; right: 10px; z-index: 1001; }
         #audioPlayer { width: 100%; max-width: 500px; margin: 20px auto; display: block; }
      </style>
   </head>
   <body>
      <div class="theme-toggle">
         <button onclick="setTheme('light')">☀️</button>
         <button onclick="setTheme('dark')">🌙</button>
      </div>

      <div class="page-frame">
         <h1>Srimad Bhagavad Gita</h1>
         <div class="top-buttons">
            <button class="sgs-button" onclick="sendCommand('SGSFirstPaada')">1st Paada<br>Only</button>
            <button class="sringeri-button" onclick="sendCommand('SringeriPaada')">1st or 3rd Paada</button>
            <button class="third-paada-button" onclick="sendCommand('ThirdPaada')">3rd Paada<br>Only</button>
         </div>

         <div class="continuous-play-box" style="margin:25px auto; max-width:600px; padding:18px; border:2px solid var(--card-border); border-radius:12px;">
            <strong>Continuous Random Play</strong><br>
            <input type="radio" name="continuousGap" value="30" id="gap30"> <label for="gap30">30s gap</label>
            <input type="radio" name="continuousGap" value="45" id="gap45"> <label for="gap45">45s gap</label>
         </div>

         <audio id="audioPlayer" controls></audio>

         <div class="language-group">
            <label><input type="checkbox" id="telugu" checked onchange="updateShlokaDisplay()"> తెలుగు</label>
            <label><input type="checkbox" id="devanagari" onchange="updateShlokaDisplay()"> देवनागरी</label>
            <label><input type="checkbox" id="english" onchange="updateShlokaDisplay()"> English</label>
            <label><input type="checkbox" id="kannada" onchange="updateShlokaDisplay()"> ಕನ್ನಡ</label>
            <label><input type="checkbox" id="tamil" onchange="updateShlokaDisplay()"> தமிழ்</label>
         </div>

         <div class="textbox-container" style="border: 2px solid var(--card-border); padding: 15px; border-radius: 10px; max-width: 600px; margin: 10px auto;">
            <div id="shlokaDisplay" class="shloka-text visible">Your Shloka will appear here.</div>
         </div>

         <div class="chapter-btn-grid">
            <script>
               for(let i=1; i<=18; i++) {
                  document.write(`<button class="chapter-btn" onclick="handleChapterSelect(${i})">${i}</button>`);
               }
            </script>
         </div>
      </div>

      <script>
         const audioPlayer = document.getElementById('audioPlayer');
         let currentShlokaData = null;

         async function sendCommand(command) {
            try {
               const response = await fetch(`/command?cmd=${command}`);
               const data = await response.json();
               if (data.audio_url) {
                  audioPlayer.src = data.audio_url;
                  audioPlayer.play();
                  currentShlokaData = data;
                  updateShlokaDisplay();
               }
            } catch (err) { console.error("Error fetching command:", err); }
         }

         function updateShlokaDisplay() {
            if (!currentShlokaData) return;
            const langs = ['telugu', 'devanagari', 'english', 'kannada', 'tamil'];
            let text = "";
            langs.forEach(lang => {
               if (document.getElementById(lang).checked && currentShlokaData[lang]) {
                  text += currentShlokaData[lang] + "\n\n";
               }
            });
            document.getElementById('shlokaDisplay').innerText = text || "Select a language";
         }

         function handleChapterSelect(chapter) {
            sendCommand(`Chapter${chapter}`);
         }

         function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
         }

         // Mobile Wake Lock Logic
         function enableWakeLock() {
            audioPlayer.play().catch(() => {});
            if (navigator.maxTouchPoints > 0) {
               const v = document.createElement('video');
               v.loop = true; v.muted = true; v.playsInline = true;
               v.style.position = 'fixed'; v.style.width = '1px';
               document.body.appendChild(v);
               v.play().catch(() => {});
            }
         }
         document.body.addEventListener('click', enableWakeLock, { once: true });
      </script>
   </body>
</html>
