<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Bhagavad Gita Bot</title>
      <meta name="description" content="Explore Bhagavad Gita shlokas in Telugu with SGS and Sringeri styles, featuring audio recitations and meanings.">
      <meta name="keywords" content="Bhagavad Gita, SGS, Sringeri, Telugu shlokas, audio recitation, spiritual app">
      <meta name="author" content="Dr. P. Udayabhaskar">
      <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css">
      <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
      <style>
         /* Restored all original CSS including Sankhu/Chakra and Mobile Grid */
         :root {
            --bg-color: #f0f0f0; --text-color: #2c3e50; --card-bg: #ffffff;
            --card-border: #357EC7; --button-bg: #357EC7; --button-text: #ffffff;
         }
         [data-theme="dark"] {
            --bg-color: #1a1a1a; --text-color: #ffffff; --card-bg: #2a2a2a;
            --card-border: #4a90e2; --button-bg: #4a90e2;
         }
         body { font-family: Outfit, sans-serif; text-align: center; padding: 20px; background-color: var(--bg-color); color: var(--text-color); }
         .page-frame { max-width: 900px; margin: 8px auto; padding: 12px; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); }
         .top-buttons { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto; }
         .top-buttons button {
            width: 150px; height: 150px; border-radius: 25%; border: none; background-color: var(--button-bg); color: var(--button-text);
            font-size: 20px; cursor: pointer; transition: all 0.3s ease; background-repeat: no-repeat; background-position: center; background-size: cover;
         }
         .top-buttons button.sgs-button:hover { background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/sankhu.png'); background-color: transparent !important; color: transparent !important; }
         .top-buttons button.sringeri-button:hover, .top-buttons button.third-paada-button:hover { background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/chakra.png'); background-color: transparent !important; color: transparent !important; }
         .language-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px auto; padding: 16px; border: 2px solid var(--card-border); border-radius: 14px; }
         .shloka-text { margin-top: 10px; font-size: 1.4em; line-height: 1.8; display: none; white-space: pre-line; }
         .visible { display: block !important; }
         .chapter-btn-grid { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
         .chapter-btn { width: 50px; height: 50px; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); cursor: pointer; font-weight: bold; }
         .player-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
         .player-container button { padding: 10px 20px; border-radius: 25px; border: none; background: var(--button-bg); color: white; cursor: pointer; min-width: 100px; }
      </style>
   </head>
   <body>
      <div class="page-frame">
         <h1>Srimad Bhagavad Gita</h1>
         <div class="top-buttons">
            <button class="sgs-button" onclick="sendCommand('SGSFirstPaada')">1st Paada<br>Only</button>
            <button class="sringeri-button" onclick="sendCommand('SringeriPaada')">1st or 3rd Paada</button>
            <button class="third-paada-button" onclick="sendCommand('ThirdPaada')">3rd Paada<br>Only</button>
         </div>

         <div class="continuous-play-box" style="margin:20px auto; max-width:600px; padding:15px; border:2px solid var(--card-border); border-radius:12px;">
            <strong>Continuous Random Play</strong><br>
            <input type="radio" name="continuousGap" value="30" id="gap30"> <label for="gap30">30s gap</label>
            <input type="radio" name="continuousGap" value="45" id="gap45"> <label for="gap45">45s gap</label>
         </div>

         <audio id="audioPlayer" controls style="width:100%; max-width:500px; margin:20px auto;"></audio>

         <div class="language-group">
            <label><input type="checkbox" id="telugu" checked> తెలుగు</label>
            <label><input type="checkbox" id="devanagari"> देवनागरी</label>
            <label><input type="checkbox" id="english"> English</label>
         </div>

         <div class="textbox-container" style="border: 2px solid var(--card-border); padding: 15px; border-radius: 10px; max-width: 600px; margin: 10px auto;">
            <div id="sgsText" class="shloka-text"></div>
            <div id="sringeriText" class="shloka-text visible">Please select a shloka...</div>
         </div>

         <div class="player-container">
            <button onclick="sendCommand('PreviousShloka')">Previous</button>
            <button onclick="sendCommand('FullShloka')">Full</button>
            <button onclick="sendCommand('NextFullShloka')">Next</button>
         </div>

         <div class="chapter-btn-grid">
            <script>
               for(let i=1; i<=18; i++) {
                  document.write(`<button class="chapter-btn" onclick="handleChapterSelect(${i})">${i}</button>`);
               }
            </script>
         </div>
      </div>

      <script>
         // RESTORED FUNCTIONAL LOGIC
         const audioPlayer = document.getElementById('audioPlayer');
         
         async function sendCommand(command) {
            try {
               const response = await fetch(`/command?cmd=${command}`);
               const data = await response.json();
               if(data.audio_url) {
                  audioPlayer.src = data.audio_url;
                  audioPlayer.play();
                  updateShlokaDisplay();
               }
            } catch (e) { console.error("Error fetching shloka:", e); }
         }

         async function updateShlokaDisplay() {
            try {
               const response = await fetch('/shloka-info');
               const data = await response.json();
               const languages = ['telugu', 'devanagari', 'english'];
               let content = "";
               
               languages.forEach(lang => {
                  if(document.getElementById(lang).checked && data[lang]) {
                     content += data[lang] + "\n\n";
                  }
               });
               
               document.getElementById('sringeriText').innerText = content || "No language selected";
            } catch (e) { console.error("Error updating text:", e); }
         }

         function handleChapterSelect(chapter) {
            const padaType = document.querySelector('input[name="padaType"]:checked')?.value || "1";
            sendCommand(`Chapter${chapter}_Type${padaType}`);
         }

         // Ensure audio works on mobile
         function enableWakeLock() {
            audioPlayer.play().catch(() => {});
         }
         document.body.addEventListener('click', enableWakeLock, { once: true });
      </script>
   </body>
</html>
