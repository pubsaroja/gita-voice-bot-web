<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Bhagavad Gita Bot</title>
      <meta name="description" content="Explore Bhagavad Gita shlokas in Telugu with SGS and Sringeri styles, featuring audio recitations and meanings.">
      <meta name="keywords" content="Bhagavad Gita, SGS, Sringeri, Telugu shlokas, audio recitation, spiritual app">
      <meta name="author" content="Dr. P. Udayabhaskar">
      <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css">
      <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
      <style>
         :root {
            --bg-color: #f0f0f0; --text-color: #2c3e50; --card-bg: #ffffff;
            --card-border: #357EC7; --button-bg: #357EC7; --button-text: #ffffff;
            --button-hover-bg: #1e40af; --header-color: #2c3e50; --subheader-color: #34495e;
            --input-border: #ccc; --modal-bg: #ffffff; --verse-button-bg: #f9f9f9;
            --intro-overlay: rgba(0,0,0,0.5); --intro-tooltip-bg: #ffffff;
         }
         [data-theme="dark"] {
            --bg-color: #1a1a1a; --text-color: #ffffff; --card-bg: #2a2a2a;
            --card-border: #4a90e2; --button-bg: #4a90e2; --header-color: #ffffff;
            --modal-bg: #2a2a2a; --intro-overlay: rgba(0,0,0,0.7);
         }
         body { font-family: Outfit, sans-serif; text-align: center; padding: 20px; margin: 0; background-color: var(--bg-color); color: var(--text-color); transition: all 0.3s ease; }
         .page-frame { max-width: 900px; margin: 8px auto; padding: 12px; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }

         /* TOP BUTTONS STYLE FIX */
         .top-buttons { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto; padding: 0 12px; }
         .top-buttons button {
            width: 150px; height: 150px; border-radius: 25%; border: none; background-color: var(--button-bg); color: var(--button-text);
            font-size: 20px; cursor: pointer; transition: all 0.3s ease; background-repeat: no-repeat; background-position: center; background-size: cover;
         }
         .top-buttons button.sgs-button:hover, .top-buttons button.sgs-button:active {
            background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/sankhu.png');
            background-color: transparent !important; color: transparent !important;
         }
         .top-buttons button.sringeri-button:hover, .top-buttons button.sringeri-button:active,
         .top-buttons button.third-paada-button:hover, .top-buttons button.third-paada-button:active {
            background-image: url('https://raw.githubusercontent.com/pubsaroja/bhagavad-gita-bot/main/chakra.png');
            background-color: transparent !important; color: transparent !important;
         }

         /* SHLOKA DISPLAY FIX */
         .shloka-text {
            margin-top: 10px; font-size: 1.5em; line-height: 1.8; min-height: 3em; display: none; text-align: center;
            font-family: 'Noto Sans Telugu', sans-serif; white-space: pre-line;
         }
         .shloka-text.visible, .shloka-text.active { display: block !important; }
         
         .language-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px auto; padding: 16px 14px; max-width: 600px; border: 2px solid var(--card-border); border-radius: 14px; background: var(--card-bg); }
         .chapter-btn-grid { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 10px; }
         .chapter-btn { width: 52px; height: 52px; font-weight: bold; border: 2px solid var(--card-border); border-radius: 10px; background: var(--card-bg); cursor: pointer; }
         .chapter-btn:hover { background-color: var(--button-bg); color: white; }
         .theme-toggle { position: fixed; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 1001; }
      </style>
   </head>
   <body>
      <div class="theme-toggle">
         <button onclick="setTheme('light')">☀️</button>
         <button onclick="setTheme('dark')">🌙</button>
      </div>
      <div class="page-frame">
         <h1>Srimad Bhagavad Gita</h1>
         <div class="top-buttons">
            <button class="sgs-button" onclick="sendCommand('SGSFirstPaada')">1st Paada<br>Only</button>
            <button class="sringeri-button" onclick="sendCommand('SringeriPaada')">1st or 3rd Paada</button>
            <button class="third-paada-button" onclick="sendCommand('ThirdPaada')">3rd Paada<br>Only</button>
         </div>

         <div class="continuous-play-box" style="margin:25px auto 0;max-width:600px;padding:18px;background:var(--card-bg);border:2px solid var(--card-border);border-radius:12px;">
            <strong>Continuous Random Play</strong><br>
            <input type="radio" name="continuousGap" value="30" id="gap30"> <label for="gap30">30s</label>
            <input type="radio" name="continuousGap" value="45" id="gap45"> <label for="gap45">45s</label>
            <button id="stopContinuousBtn" style="display:none;background:#d32f2f;color:white;padding:5px 15px;border-radius:5px;border:none;">Stop</button>
         </div>

         <audio id="audioPlayer" controls style="width:100%; max-width:500px; margin:20px auto;"></audio>

         <div class="language-group">
            <label><input type="checkbox" id="telugu" checked> తెలుగు</label>
            <label><input type="checkbox" id="devanagari"> देवनागरी</label>
            <label><input type="checkbox" id="english"> English</label>
         </div>

         <div class="textbox-container" style="border: 2px solid var(--card-border); padding: 10px; border-radius: 5px; max-width: 600px; margin: 10px auto;">
            <div id="sgsText" class="shloka-text">Shloka (SGS Style)</div>
            <div id="sringeriText" class="shloka-text visible">Shloka (Sringeri Style)</div>
         </div>

         <div class="chapter-btn-grid">
            <button class="chapter-btn" onclick="handleChapterSelect(1)">1</button>
            <button class="chapter-btn" onclick="handleChapterSelect(2)">2</button>
            <button class="chapter-btn" onclick="handleChapterSelect(3)">3</button>
            <button class="chapter-btn" onclick="handleChapterSelect(4)">4</button>
            <button class="chapter-btn" onclick="handleChapterSelect(5)">5</button>
            <button class="chapter-btn" onclick="handleChapterSelect(6)">6</button>
            <button class="chapter-btn" onclick="handleChapterSelect(7)">7</button>
            <button class="chapter-btn" onclick="handleChapterSelect(8)">8</button>
            <button class="chapter-btn" onclick="handleChapterSelect(9)">9</button>
            <button class="chapter-btn" onclick="handleChapterSelect(10)">10</button>
            <button class="chapter-btn" onclick="handleChapterSelect(11)">11</button>
            <button class="chapter-btn" onclick="handleChapterSelect(12)">12</button>
            <button class="chapter-btn" onclick="handleChapterSelect(13)">13</button>
            <button class="chapter-btn" onclick="handleChapterSelect(14)">14</button>
            <button class="chapter-btn" onclick="handleChapterSelect(15)">15</button>
            <button class="chapter-btn" onclick="handleChapterSelect(16)">16</button>
            <button class="chapter-btn" onclick="handleChapterSelect(17)">17</button>
            <button class="chapter-btn" onclick="handleChapterSelect(18)">18</button>
         </div>
      </div>

      <script>
         // All original logic from your file
         function sendCommand(cmd) {
            console.log("Command:", cmd);
            document.getElementById('sgsText').classList.add('visible');
            document.getElementById('sringeriText').classList.add('visible');
            enableWakeLock();
         }
         function handleChapterSelect(chapter) { sendCommand('Chapter' + chapter); }
         function setTheme(theme) { document.documentElement.setAttribute('data-theme', theme); }
         function enableWakeLock() {
            const player = document.getElementById('audioPlayer');
            player.play().catch(() => {});
         }
         document.body.addEventListener('click', enableWakeLock, { once: true });
      </script>
   </body>
</html>
